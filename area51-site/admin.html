<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — AREA 51 Prenotazioni</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --card:     #181818;
      --border:   #2a2a2a;
      --accent:   #c8a04a;
      --accent2:  #e8b85a;
      --red:      #e05555;
      --green:    #4caf7d;
      --blue:     #5599e8;
      --text:     #f0ede8;
      --muted:    #888880;
      --font-h:   'Bebas Neue', sans-serif;
      --font-b:   'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-b);
      min-height: 100vh;
    }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, #1a1500 0%, #0a0a0a 70%);
    }
    .login-box {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
    }
    .login-logo {
      font-family: var(--font-h);
      font-size: 2.8rem;
      letter-spacing: 4px;
      color: var(--accent);
      text-align: center;
      margin-bottom: 0.25rem;
    }
    .login-sub {
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }
    .login-box label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .login-box input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-b);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .login-box input[type="password"]:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.85rem;
      background: var(--accent);
      color: #000;
      font-family: var(--font-h);
      font-size: 1.1rem;
      letter-spacing: 3px;
      border: none;
      cursor: pointer;
      transition: background .2s;
    }
    .login-btn:hover { background: var(--accent2); }
    .login-err {
      margin-top: 0.75rem;
      text-align: center;
      color: var(--red);
      font-size: 0.85rem;
      display: none;
    }

    /* ── DASHBOARD ── */
    #dashboard { display: none; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-logo {
      font-family: var(--font-h);
      font-size: 1.4rem;
      letter-spacing: 4px;
      color: var(--accent);
    }
    .topbar-logo span { color: var(--muted); font-size: 0.85rem; letter-spacing: 2px; margin-left: 0.75rem; font-family: var(--font-b); }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-b);
      font-size: 0.8rem;
      letter-spacing: 1px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .main { padding: 2rem; max-width: 1300px; margin: 0 auto; }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
    }
    .stat-card.green::before { background: var(--green); }
    .stat-card.blue::before  { background: var(--blue); }
    .stat-card.red::before   { background: var(--red); }
    .stat-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-family: var(--font-h);
      font-size: 2.2rem;
      letter-spacing: 2px;
      color: var(--text);
    }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .toolbar-title {
      font-family: var(--font-h);
      font-size: 1.3rem;
      letter-spacing: 3px;
      color: var(--text);
      flex: 1;
    }
    .filter-input {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-b);
      font-size: 0.875rem;
      padding: 0.5rem 0.9rem;
      outline: none;
      width: 220px;
      transition: border-color .2s;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-b);
      font-size: 0.875rem;
      padding: 0.5rem 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .refresh-btn {
      background: var(--accent);
      border: none;
      color: #000;
      font-family: var(--font-h);
      font-size: 0.95rem;
      letter-spacing: 2px;
      padding: 0.5rem 1.2rem;
      cursor: pointer;
      transition: background .2s;
    }
    .refresh-btn:hover { background: var(--accent2); }
    .refresh-btn:disabled { opacity: .5; cursor: default; }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
    }
    th {
      padding: 0.8rem 1rem;
      text-align: left;
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { color: var(--accent); }
    th.sorted { color: var(--accent); }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(200,160,74,.04); }
    td {
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      vertical-align: middle;
    }
    .td-nome { font-weight: 500; }
    .td-data { color: var(--accent); font-weight: 500; white-space: nowrap; }
    .td-persone {
      font-family: var(--font-h);
      font-size: 1.1rem;
      letter-spacing: 1px;
    }
    .td-tel a { color: var(--blue); text-decoration: none; }
    .td-tel a:hover { text-decoration: underline; }
    .td-note { color: var(--muted); font-size: 0.8rem; max-width: 200px; }

    /* badge occasione */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      font-size: 0.7rem;
      letter-spacing: 1px;
      border: 1px solid;
      white-space: nowrap;
    }
    .badge-compleanno  { color: #e87aba; border-color: #e87aba44; background: #e87aba11; }
    .badge-anniversario { color: #c87ae8; border-color: #c87ae844; background: #c87ae811; }
    .badge-lavoro      { color: var(--blue); border-color: #5599e844; background: #5599e811; }
    .badge-altro       { color: var(--muted); border-color: var(--border); }

    /* stato */
    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-new    { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot-today  { background: var(--green);  box-shadow: 0 0 6px var(--green); }
    .dot-past   { background: var(--border); }

    /* azioni */
    .act-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      transition: all .15s;
      font-family: var(--font-b);
      margin-right: 0.3rem;
    }
    .act-btn:hover { border-color: var(--accent); color: var(--accent); }
    .act-btn.del:hover { border-color: var(--red); color: var(--red); }

    /* empty / loading */
    .empty-row td {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-style: italic;
    }

    /* loading spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* toast */
    .toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      padding: 0.75rem 1.2rem;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all .3s;
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.err  { border-left-color: var(--red); }

    /* detail modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      max-width: 480px;
      width: 100%;
      padding: 2rem;
    }
    .modal h2 {
      font-family: var(--font-h);
      font-size: 1.6rem;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }
    .detail-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.875rem;
    }
    .detail-key {
      font-size: 0.68rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 90px;
      padding-top: 0.1rem;
    }
    .modal-close {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-b);
      font-size: 0.875rem;
      cursor: pointer;
      transition: all .2s;
    }
    .modal-close:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 600px) {
      .main { padding: 1rem; }
      .filter-input { width: 100%; }
      .topbar { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════ LOGIN ═══════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">AREA 51</div>
    <div class="login-sub">Pannello Prenotazioni</div>
    <label for="pwd">Password</label>
    <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password"/>
    <button class="login-btn" onclick="doLogin()">ACCEDI</button>
    <div class="login-err" id="login-err">Password errata. Riprova.</div>
  </div>
</div>

<!-- ═══════════════════════ DASHBOARD ═══════════════════════ -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">AREA 51 <span>/ Admin</span></div>
    <button class="logout-btn" onclick="doLogout()">Esci</button>
  </div>

  <div class="main">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Totale</div>
        <div class="stat-value" id="st-total">—</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Oggi</div>
        <div class="stat-value" id="st-oggi">—</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Prossimi 7gg</div>
        <div class="stat-value" id="st-week">—</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Coperti oggi</div>
        <div class="stat-value" id="st-coperti">—</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="toolbar-title">PRENOTAZIONI</div>
      <input class="filter-input" type="text" id="search" placeholder="Cerca nome, telefono…" oninput="renderTable()"/>
      <select class="filter-select" id="filter-period" onchange="renderTable()">
        <option value="all">Tutte le date</option>
        <option value="today">Solo oggi</option>
        <option value="week">Prossimi 7 giorni</option>
        <option value="future">Future</option>
        <option value="past">Passate</option>
      </select>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">↻ AGGIORNA</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('data')">Data ↕</th>
            <th onclick="sortBy('ora')">Ora ↕</th>
            <th onclick="sortBy('nome')">Nome ↕</th>
            <th>Telefono</th>
            <th onclick="sortBy('persone')">Persone ↕</th>
            <th>Occasione</th>
            <th>Stato</th>
            <th>Azioni</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

  </div><!-- /main -->
</div><!-- /dashboard -->

<!-- Modal dettaglio -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <h2>DETTAGLIO</h2>
    <div id="modal-body"></div>
    <button class="modal-close" onclick="closeModal()">Chiudi</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
'use strict';

/* ── CONFIG ── */
const PASSWORD = 'area1234';
const SB_URL   = 'https://dnyuexpvfoknjsxdqvzl.supabase.co';
const SB_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRueXVleHB2Zm9rbmpzeGRxdnpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDcwMTQsImV4cCI6MjA4ODIyMzAxNH0.VfLoEzHxs5CcliUtmSJdEygS4Ofl7wr2Z55ZrWCGZQ4';

let allData   = [];
let sortField = 'data';
let sortAsc   = true;

/* ── LOGIN ── */
function doLogin() {
  const val = document.getElementById('pwd').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'block';
    loadData();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  document.getElementById('dashboard').style.display    = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd').value = '';
}

/* ── FETCH DATA ── */
async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Carico…';

  try {
    const res = await fetch(SB_URL + '/rest/v1/bookings?select=*&order=data.asc,ora.asc', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allData = await res.json();
    renderStats();
    renderTable();
    showToast('Dati aggiornati ✓');
  } catch (e) {
    showToast('Errore caricamento dati', true);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ AGGIORNA';
  }
}

/* ── STATS ── */
function renderStats() {
  const today = todayStr();
  const in7   = nextNDays(7);
  const total   = allData.length;
  const oggiArr = allData.filter(r => r.data === today);
  const weekArr = allData.filter(r => r.data >= today && r.data <= in7);
  const coperti = oggiArr.reduce((s, r) => s + (r.persone || 0), 0);
  document.getElementById('st-total').textContent   = total;
  document.getElementById('st-oggi').textContent    = oggiArr.length;
  document.getElementById('st-week').textContent    = weekArr.length;
  document.getElementById('st-coperti').textContent = coperti;
}

/* ── TABLE ── */
function renderTable() {
  const q      = document.getElementById('search').value.toLowerCase().trim();
  const period = document.getElementById('filter-period').value;
  const today  = todayStr();
  const in7    = nextNDays(7);

  let rows = allData.filter(r => {
    if (q) {
      const hay = `${r.nome} ${r.cognome} ${r.telefono} ${r.email || ''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (period === 'today')  return r.data === today;
    if (period === 'week')   return r.data >= today && r.data <= in7;
    if (period === 'future') return r.data >= today;
    if (period === 'past')   return r.data < today;
    return true;
  });

  rows.sort((a, b) => {
    let av = a[sortField] ?? '', bv = b[sortField] ?? '';
    if (sortField === 'persone') { av = Number(av); bv = Number(bv); }
    else { av = String(av).toLowerCase(); bv = String(bv).toLowerCase(); }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ?  1 : -1;
    return 0;
  });

  const tbody = document.getElementById('tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Nessuna prenotazione trovata.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const dataFmt  = fmtDate(r.data);
    const status   = getStatus(r.data);
    const occ      = badgeOcc(r.occasione);
    return `<tr>
      <td class="td-data">${dataFmt}</td>
      <td>${r.ora || '—'}</td>
      <td class="td-nome">${esc(r.nome)} ${esc(r.cognome)}</td>
      <td class="td-tel"><a href="tel:${esc(r.telefono)}">${esc(r.telefono)}</a></td>
      <td class="td-persone">${r.persone || '—'}</td>
      <td>${occ}</td>
      <td>${status}</td>
      <td>
        <button class="act-btn" onclick='showDetail(${JSON.stringify(r)})'>Dettaglio</button>
        <button class="act-btn del" onclick="deleteRow('${r.id}', '${esc(r.nome)} ${esc(r.cognome)}')">Elimina</button>
      </td>
    </tr>`;
  }).join('');
}

function sortBy(field) {
  if (sortField === field) sortAsc = !sortAsc;
  else { sortField = field; sortAsc = true; }
  renderTable();
}

/* ── DETAIL MODAL ── */
function showDetail(r) {
  const dataFmt = fmtDate(r.data);
  const rows = [
    ['Nome',       `${esc(r.nome)} ${esc(r.cognome)}`],
    ['Data',       dataFmt],
    ['Ora',        r.ora || '—'],
    ['Persone',    r.persone || '—'],
    ['Telefono',   `<a href="tel:${esc(r.telefono)}" style="color:var(--blue)">${esc(r.telefono)}</a>`],
    ['Email',      r.email ? `<a href="mailto:${esc(r.email)}" style="color:var(--blue)">${esc(r.email)}</a>` : '—'],
    ['Occasione',  r.occasione || '—'],
    ['Note',       r.note || '—'],
  ];
  document.getElementById('modal-body').innerHTML = rows.map(([k,v]) =>
    `<div class="detail-row"><span class="detail-key">${k}</span><span>${v}</span></div>`
  ).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

/* ── DELETE ── */
async function deleteRow(id, name) {
  if (!confirm(`Eliminare la prenotazione di ${name}?`)) return;
  try {
    const res = await fetch(`${SB_URL}/rest/v1/bookings?id=eq.${id}`, {
      method: 'DELETE',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!res.ok) throw new Error();
    allData = allData.filter(r => r.id != id);
    renderStats();
    renderTable();
    showToast('Prenotazione eliminata');
  } catch {
    showToast('Errore durante eliminazione', true);
  }
}

/* ── HELPERS ── */
function todayStr() {
  return new Date().toISOString().split('T')[0];
}
function nextNDays(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function fmtDate(str) {
  if (!str) return '—';
  const [y,m,d] = str.split('-');
  return `${d}/${m}/${y}`;
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function getStatus(data) {
  const today = todayStr();
  if (data === today) return `<span class="status-dot"><span class="dot dot-today"></span> Oggi</span>`;
  if (data > today)   return `<span class="status-dot"><span class="dot dot-new"></span> In arrivo</span>`;
  return `<span class="status-dot"><span class="dot dot-past"></span> Passata</span>`;
}
function badgeOcc(occ) {
  if (!occ) return '';
  const map = {
    'Compleanno': 'badge-compleanno',
    'Anniversario': 'badge-anniversario',
    'Cena di lavoro': 'badge-lavoro',
    'Altro': 'badge-altro'
  };
  const cls = map[occ] || 'badge-altro';
  return `<span class="badge ${cls}">${esc(occ)}</span>`;
}

function showToast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}
</script>
